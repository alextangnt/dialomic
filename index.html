<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>My first three.js app</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="https://openprocessing.org/openprocessing_sketch.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1/lib/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1/lib/addons/p5.sound.min.js"></script>
  </head>
  <body>
    <div class="background-element" id="paper-bg"></div>
    <iframe id="logicEngine" src="/story.with-messaging.html"></iframe>
    <div id="topbar">
      <div id="storyStatus">Default story</div>
      <div id="storyControls">
        <input id="storyFile" type="file" accept=".html,text/html">
        <button id="storyToggleBtn" type="button">Play default story</button>
        <span id="fileStatus"></span>
      </div>
    </div>
    <script id="p5" type="module" src="/src/layout.js"></script>
  </body>
</html>
